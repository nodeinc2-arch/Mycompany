name: Secret scan

# Scans every push and PR for committed secrets (API keys, tokens, private keys)
# using gitleaks. This is the no-cost alternative to GitHub Advanced Security
# secret scanning, and works on private repos. A finding fails the check.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers all commits in a PR, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
