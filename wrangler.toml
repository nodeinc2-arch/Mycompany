name = "node2-site"
main = ".open-next/worker.js"
compatibility_date = "2026-06-08"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Durable store for Pay.ca billing entitlement. Create the namespace once with
#   wrangler kv namespace create PAYCA_KV
# then paste the returned id below. Until then, the app falls back to an
# in-memory store (see lib/labs/payroll/entitlement.ts).
[[kv_namespaces]]
binding = "PAYCA_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[routes]]
pattern = "www.node2.io"
zone_name = "node2.io"
custom_domain = true

[[routes]]
pattern = "node2.io"
zone_name = "node2.io"
custom_domain = true