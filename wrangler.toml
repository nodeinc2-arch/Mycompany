name = "node2-site"
main = ".open-next/worker.js"
compatibility_date = "2026-06-08"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
# Exposes /labs/* (incl. /labs/payroll) in production. Required for the Pay.ca
# product link in the homepage finance section to resolve instead of 404.
LABS_ENABLED = "1"

# Durable, relational store for Pay.ca (audit log, billing entitlement,
# tenants). Create the database and apply migrations with:
#   wrangler d1 create PAYCA_DB      # prints database_id
#   pnpm db:migrate                  # applies migrations/ locally
#   pnpm db:migrate:remote           # applies to the deployed DB
# then uncomment the block below and paste the returned database_id. Until then,
# the app falls back to a non-durable in-memory store (see lib/labs/payroll/db.ts
# and docs/d1-setup.md). Left commented because a placeholder id fails the deploy.
# [[d1_databases]]
# binding = "PAYCA_DB"
# database_name = "payca"
# database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[routes]]
pattern = "www.node2.io"
zone_name = "node2.io"
custom_domain = true

[[routes]]
pattern = "node2.io"
zone_name = "node2.io"
custom_domain = true