name = "node2-site"
main = ".open-next/worker.js"
compatibility_date = "2026-06-08"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
# Exposes /labs/* (incl. /labs/payroll) in production. Required for the Pay.ca
# product link in the homepage finance section to resolve instead of 404.
LABS_ENABLED = "1"

# Durable store for Pay.ca billing entitlement. Create the namespace with
#   wrangler kv namespace create PAYCA_KV
# then uncomment the block below and paste the returned id. Until then, the app
# falls back to a non-durable in-memory store (see lib/labs/payroll/entitlement.ts).
# Left commented because an invalid/placeholder id would fail the deploy.
# [[kv_namespaces]]
# binding = "PAYCA_KV"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[routes]]
pattern = "www.node2.io"
zone_name = "node2.io"
custom_domain = true

[[routes]]
pattern = "node2.io"
zone_name = "node2.io"
custom_domain = true